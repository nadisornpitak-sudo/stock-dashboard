<!DOCTYPE html>
<html lang="th"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>วิเคราะห์สินค้า & กลยุทธ์ — Butterfly Thai Perfume</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--navy:#1F2A44;--blue:#2E5BFF;--green:#16A34A;--orange:#EA580C;--bg:#F4F6FB;--card:#fff;--line:#E5E9F2;--muted:#667085}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Segoe UI",Roboto,"Noto Sans Thai",sans-serif;background:var(--bg);color:var(--navy);padding:24px;max-width:1240px;margin:auto}
h1{font-size:23px}h2{font-size:18px;margin:6px 0}
select{padding:8px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-weight:600;font-family:inherit}
.head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:18px}
.muted{color:var(--muted);font-size:13px}
.grp{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:22px;box-shadow:0 1px 3px rgba(16,24,40,.04)}
.grp h2{display:flex;align-items:center;gap:10px}
.tag{font-size:12px;font-weight:700;color:#fff;background:var(--blue);padding:3px 12px;border-radius:99px}
.kpis{display:flex;gap:12px;flex-wrap:wrap;margin:12px 0 16px}
.kpi{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:10px 16px;min-width:130px}
.kpi .l{font-size:12px;color:var(--muted)}.kpi .v{font-size:20px;font-weight:800}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px}
.box{border:1px solid var(--line);border-radius:12px;padding:14px}
.box h3{font-size:13px;margin-bottom:10px;color:#334155}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:6px 8px;text-align:right;border-bottom:1px solid var(--line)}
th:first-child,td:first-child,th.l,td.l{text-align:left}
thead th{background:#F1F4FA;color:#475467}
.pill{font-size:11.5px;padding:1px 8px;border-radius:99px;background:#EEF1F7;color:#475467}
.recs{display:flex;flex-direction:column;gap:8px}
.rec{background:#F0FDF4;border-left:3px solid var(--green);border-radius:8px;padding:9px 12px}
.rec.warn{background:#FEF2F2;border-left-color:#DC2626}.rec.info{background:#EFF6FF;border-left-color:var(--blue)}
.rec .t{font-size:12px;font-weight:700}.rec .s{font-size:12px;color:#475467;margin-top:2px}
.foot{color:var(--muted);font-size:12px;text-align:center;margin-top:10px}
canvas{max-height:200px}
@media(max-width:760px){.row{grid-template-columns:1fr}}
.nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.nav a{text-decoration:none;font-size:13px;font-weight:600;color:#475467;background:var(--card);border:1px solid var(--line);border-radius:99px;padding:8px 14px}
.nav a.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.nav a:not(.on):hover{border-color:var(--blue);color:var(--blue)}
</style></head><body>
<nav class="nav">
  <a href="stock_dashboard.html">📦 สต็อกคงเหลือ</a>
  <a href="dashboard.html">📊 เบิก/ขาย</a>
  <a href="product_analysis.html" class="on">📈 วิเคราะห์สินค้า</a>
  <a href="scan.html">📷 สแกนสต๊อก</a>
</nav>
<div class="head">
  <div><h1>📈 วิเคราะห์สินค้า & กลยุทธ์</h1>
    <div class="muted" id="updated"></div>
    <div class="muted">ขายได้/ไม่ได้ วัดจากยอดขายจริง (฿) · แยก 10ml / 60ml / อื่นๆ · มุมแพลตฟอร์ม + มุมคลัง</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px"><span class="muted">เลือกเดือน</span><select id="monthSel"></select></div>
</div>
<div id="groups"></div>
<div class="foot" id="foot"></div>
<script>
const D={"generated": "23 มิ.ย. 2569 เวลา 15:38 น.", "months": [{"key": "2569-06", "label": "มิ.ย. 2569", "groups": [{"name": "10 ML", "totalSales": 0, "soldCount": 0, "deadCount": 0, "platLabels": ["TikTok", "Lazada", "Shopee", "365"], "platData": [0, 0, 0, 0], "chanLabels": ["Shop", "Online", "Dealer"], "chanData": [13397, 10348, 1300], "top": [], "dead": [], "recs": [{"t": "ยังไม่มียอดขาย", "s": "กลุ่มนี้ยังไม่มีรายการขายออนไลน์ในเดือนนี้ — พิจารณาเปิดการขาย/ทำโปร"}]}, {"name": "60 ML", "totalSales": 0, "soldCount": 0, "deadCount": 0, "platLabels": ["TikTok", "Lazada", "Shopee", "365"], "platData": [0, 0, 0, 0], "chanLabels": ["Shop", "Online", "Dealer"], "chanData": [6399, 5128, 791], "top": [], "dead": [], "recs": [{"t": "ยังไม่มียอดขาย", "s": "กลุ่มนี้ยังไม่มีรายการขายออนไลน์ในเดือนนี้ — พิจารณาเปิดการขาย/ทำโปร"}]}, {"name": "อื่นๆ", "totalSales": 0, "soldCount": 0, "deadCount": 35, "platLabels": ["TikTok", "Lazada", "Shopee", "365"], "platData": [0, 0, 0, 0], "chanLabels": ["Shop", "Online", "Dealer"], "chanData": [11775, 11801, 1983], "top": [], "dead": [{"sku": "FG0113-172", "desc": "EDP 3 ML. กลิ่น Kali Girl Award Edition (ห้า", "rem": 5019}, {"sku": "FG1215-132", "desc": "Body oil Gliter Glowie wink 5 ML.(ห้ามจำหน่า", "rem": 3000}, {"sku": "FG0101-192", "desc": "EDP 2 ML. กลิ่น Full moon party (ห้ามจำหน่าย", "rem": 2000}, {"sku": "FG0101-168", "desc": "", "rem": 2000}, {"sku": "FG0101-153", "desc": "EDP 2 ML. กลิ่น ไม้กฤษณากำยาน (ห้ามจำหน่าย)", "rem": 1174}, {"sku": "FG1215-167", "desc": "Body oil  Agarwood & Benzoin 5 ML. (ห้ามจำหน", "rem": 358}, {"sku": "FG1215-156", "desc": "Body oil Cork tree blossom 5 ML. (ห้ามจำหน่า", "rem": 354}, {"sku": "FG0102-207", "desc": "EDP 10 ML. Tropcial Oud (ห้ามจำหน่าย)", "rem": 298}, {"sku": "FG0208-163", "desc": "DIFFUSER 150 ML. กลิ่น ส้มสีทอง (ห้ามจำหน่าย", "rem": 182}, {"sku": "FG0102-209", "desc": "EDP 10 ML. Thai Honey Oud (ห้ามจำหน่าย)", "rem": 180}, {"sku": "FG0113-171", "desc": "EDP 3 ML. กลิ่น ควันไม้กฤษณา (ห้ามจำหน่าย)", "rem": 163}, {"sku": "FG0208-011", "desc": "DIFFUSER 150 ML. กลิ่น ใบมะม่วง", "rem": 120}, {"sku": "FG0308-221", "desc": "", "rem": 100}, {"sku": "FG0208-193", "desc": "DIFFUSER 150 ML. กลิ่น เกาะเสม็ด (ห้ามจำหน่า", "rem": 97}, {"sku": "FG0101-166", "desc": "EDP 2 ML. กลิ่น บัวหลวง  (ห้ามจำหน่าย)", "rem": 88}], "recs": [{"t": "ยังไม่มียอดขาย", "s": "กลุ่มนี้ยังไม่มีรายการขายออนไลน์ในเดือนนี้ — พิจารณาเปิดการขาย/ทำโปร"}, {"t": "ของไม่เคลื่อนไหว", "s": "35 รายการมีสต็อกแต่ไม่ถูกเบิกเลยเดือนนี้ (รวม ~15,763 ชิ้น) — จัดโปรล้างสต็อก/โยกช่องทาง"}]}]}], "defaultKey": "2569-06"};
const nf=n=>Number(n||0).toLocaleString('en-US');
const PLATC=['#e94560','#9334e6','#fb8c00','#0f3460'];
const CHANC=['#16A34A','#EA580C','#2E5BFF'];
const charts={};
function mk(id,cfg){try{if(charts[id])charts[id].destroy();var el=document.getElementById(id);if(el)charts[id]=new Chart(el,cfg);}catch(e){console.error(id,e);}}
let M=null;
const sel=document.getElementById('monthSel');
sel.innerHTML=D.months.map(m=>`<option value="${m.key}">${m.label}</option>`).join('');
sel.value=D.defaultKey;
sel.onchange=()=>{M=D.months.find(x=>x.key===sel.value);render();};
{const e=document.getElementById('updated');if(e)e.textContent=`🕒 อัปเดตล่าสุด: ${D.generated}`;}

function render(){
  const wrap=document.getElementById('groups'); wrap.innerHTML='';
  M.groups.forEach((g,gi)=>{
    const sold=g.top.map((r,i)=>`<tr><td>${i+1}</td><td class="l">${r.n}</td><td><span class="pill">${r.plat}</span></td><td>${nf(r.qty)}</td><td style="font-weight:700">฿${nf(r.val)}</td></tr>`).join('')||'<tr><td colspan="5" style="color:#aaa">— ไม่มียอดขาย —</td></tr>';
    const dead=g.dead.map(r=>`<tr><td class="l">${r.sku}</td><td class="l">${r.desc}</td><td style="font-weight:700;color:#DC2626">${nf(r.rem)}</td></tr>`).join('')||'<tr><td colspan="3" style="color:#16A34A">— ไม่มีของค้าง —</td></tr>';
    const recs=g.recs.map(r=>{const cls=r.t.includes('ไม่เคลื่อนไหว')||r.t.includes('ยังไม่มี')?'warn':(r.t.includes('ว่าง')?'info':'');return `<div class="rec ${cls}"><div class="t">💡 ${r.t}</div><div class="s">${r.s}</div></div>`;}).join('');
    wrap.insertAdjacentHTML('beforeend',`
    <div class="grp">
      <h2><span class="tag">${g.name}</span> ภาพรวมกลุ่ม</h2>
      <div class="kpis">
        <div class="kpi"><div class="l">ยอดขายรวม (฿)</div><div class="v" style="color:var(--green)">฿${nf(g.totalSales)}</div></div>
        <div class="kpi"><div class="l">รายการที่ขายได้</div><div class="v" style="color:var(--blue)">${nf(g.soldCount)}</div></div>
        <div class="kpi"><div class="l">ของไม่เคลื่อนไหว</div><div class="v" style="color:var(--orange)">${nf(g.deadCount)}</div></div>
      </div>
      <div class="row">
        <div class="box"><h3>ยอดขาย (฿) แยกแพลตฟอร์ม</h3><canvas id="pf${gi}"></canvas></div>
        <div class="box"><h3>เบิกออกจากคลัง (ชิ้น) แยกช่องทาง</h3><canvas id="ch${gi}"></canvas></div>
      </div>
      <div class="row">
        <div class="box"><h3>🏆 สินค้าขายได้ดี (ตามยอด ฿)</h3><table><thead><tr><th>#</th><th class="l">สินค้า</th><th class="l">ช่องทาง</th><th>ชิ้น</th><th>฿</th></tr></thead><tbody>${sold}</tbody></table></div>
        <div class="box"><h3>🐌 ของในคลังที่ไม่เคลื่อนไหวเดือนนี้</h3><table><thead><tr><th class="l">รหัส</th><th class="l">รายละเอียด</th><th>คงเหลือ</th></tr></thead><tbody>${dead}</tbody></table></div>
      </div>
      <div class="box"><h3>คำแนะนำ & กลยุทธ์</h3><div class="recs">${recs}</div></div>
    </div>`);
    mk('pf'+gi,{type:'bar',data:{labels:g.platLabels,datasets:[{data:g.platData,backgroundColor:PLATC,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' ฿'+c.parsed.y.toLocaleString()}}},scales:{y:{ticks:{callback:v=>'฿'+(v/1000)+'k'}}}}});
    mk('ch'+gi,{type:'bar',data:{labels:g.chanLabels,datasets:[{data:g.chanData,backgroundColor:CHANC,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>v.toLocaleString()}}}}});
  });
  document.getElementById('foot').textContent=`สร้างเมื่อ ${D.generated} • ${M.label}`;
}
M=D.months.find(x=>x.key===D.defaultKey)||D.months[0];
render();
</script></body></html>
